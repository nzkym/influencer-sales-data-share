name: 인플루언서 판매 데이터 업데이트

on:
  workflow_dispatch:  # GitHub 웹에서 수동 실행 버튼만 (Google Cloud에서 자동 실행)

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'influencer data shared/requirements.txt'

      - name: 패키지 설치
        run: pip install -r "influencer data shared/requirements.txt"

      - name: 구글 서비스 계정 키 파일 생성
        run: |
          mkdir -p "influencer data shared/credentials"
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > "influencer data shared/credentials/google-credentials.json"

      - name: .env 파일 생성
        env:
          MASTER_SHEET_URL: ${{ secrets.MASTER_SHEET_URL }}
          NUTONE_CLIENT_ID: ${{ secrets.NUTONE_CLIENT_ID }}
          NUTONE_CLIENT_SECRET: ${{ secrets.NUTONE_CLIENT_SECRET }}
          JDHEALTH_CLIENT_ID: ${{ secrets.JDHEALTH_CLIENT_ID }}
          JDHEALTH_CLIENT_SECRET: ${{ secrets.JDHEALTH_CLIENT_SECRET }}
          NUTPET_CLIENT_ID: ${{ secrets.NUTPET_CLIENT_ID }}
          NUTPET_CLIENT_SECRET: ${{ secrets.NUTPET_CLIENT_SECRET }}
        run: |
          {
            echo "MASTER_SHEET_URL=$MASTER_SHEET_URL"
            echo "NUTONE_CLIENT_ID=$NUTONE_CLIENT_ID"
            echo "NUTONE_CLIENT_SECRET=$NUTONE_CLIENT_SECRET"
            echo "JDHEALTH_CLIENT_ID=$JDHEALTH_CLIENT_ID"
            echo "JDHEALTH_CLIENT_SECRET=$JDHEALTH_CLIENT_SECRET"
            echo "NUTPET_CLIENT_ID=$NUTPET_CLIENT_ID"
            echo "NUTPET_CLIENT_SECRET=$NUTPET_CLIENT_SECRET"
          } > "influencer data shared/.env"

      - name: 판매 데이터 업데이트 실행
        run: |
          cd "influencer data shared"
          python main.py --once
